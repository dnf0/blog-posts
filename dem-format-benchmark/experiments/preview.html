<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blog Preview</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 2rem; color: #333; }
    img { max-width: 100%; height: auto; display: block; margin: 1rem 0; border: 1px solid #eee; border-radius: 4px; }
    code { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; }
    pre { background: #f4f4f4; padding: 1rem; border-radius: 4px; overflow-x: auto; }
    pre code { background: none; padding: 0; }
    blockquote { border-left: 4px solid #0066cc; margin: 0; padding-left: 1rem; color: #555; background: #f9f9f9; padding: 1rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f4f4f4; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="content">Loading preview...</div>
  <script>
    fetch('/content/2026-05-10-dem-format-benchmark.mdx')
      .then(response => response.text())
      .then(text => {
        // Strip frontmatter
        const markdown = text.replace(/^---[\s\S]+?---\n/, '');
        // Hack for custom callout
        const processed = markdown.replace(/<Callout type="([^"]+)">([\s\S]+?)<\/Callout>/g, '> **$1**\n> $2');
        document.getElementById('content').innerHTML = marked.parse(processed);
      })
      .catch(err => {
        document.getElementById('content').innerHTML = '<p style="color:red">Error loading content: ' + err + '</p>';
      });
  </script>
</body>
</html>
